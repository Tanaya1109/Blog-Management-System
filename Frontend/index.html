
<!DOCTYPE html>
<html>
<head>
    <title>Blog Management System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.75rem;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 500;
            color: #111;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 13px;
            color: #666;
        }

        .add-btn {
            text-decoration: none;
            background: #1a3f7a;
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.15s;
        }

        .add-btn:hover {
            background: #15336a;
        }

        .blog-card {
            background: #fff;
            padding: 1.25rem 1.5rem;
            border-radius: 12px;
            border: 0.5px solid #e0e0e0;
            margin-bottom: 1rem;
        }

        .blog-card h2 {
            font-size: 15px;
            font-weight: 500;
            color: #111;
            margin-bottom: 4px;
        }

        .meta {
            font-size: 12px;
            color: #999;
            margin-bottom: 0.75rem;
        }

        .content {
            font-size: 13px;
            color: #444;
            line-height: 1.65;
            margin-bottom: 1rem;
            border-top: 0.5px solid #f0f0f0;
            padding-top: 0.75rem;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            transition: background 0.15s;
        }

        .update {
            background: #eef3fc;
            color: #1a3f7a;
        }

        .update:hover {
            background: #dce8fa;
        }

        .delete {
            background: #fef0f0;
            color: #b91c1c;
        }

        .delete:hover {
            background: #fde0e0;
        }

        .empty {
            text-align: center;
            padding: 3rem 1rem;
            color: #999;
            font-size: 14px;
        }

        .empty i {
            font-size: 32px;
            display: block;
            margin-bottom: 0.5rem;
            color: #ccc;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <div>
            <h1>Blog management</h1>
            <h1>hellooo</h1>
            <p>Manage and publish your blog posts</p>
        </div>
        <a href="/create" class="add-btn">+ Create blog</a>
    </div>

    {% if blogs %}

        {% for blog in blogs %}

        <div class="blog-card">
            <h2>{{ blog.title }}</h2>
            <div class="meta">By {{ blog.author }}</div>
            <div class="content">{{ blog.content }}</div>
            <div class="actions">
                <a href="/update/{{ blog.id }}" class="btn update">Edit</a>
                <a href="/delete-page/{{ blog.id }}" class="btn delete">Delete</a>
            </div>
        </div>

        {% endfor %}

    {% else %}

        <div class="empty">
            <i class="ti ti-file-off" aria-hidden="true"></i>
            No blogs yet. Create your first one.
        </div>

    {% endif %}

</div>

</body>
</html>
