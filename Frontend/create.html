<!DOCTYPE html>
<html>
<head>
    <title>Create Blog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .card {
            background: #ffffff;
            width: 100%;
            max-width: 480px;
            padding: 2rem 2.25rem;
            border-radius: 12px;
            border: 0.5px solid #e0e0e0;
        }

        .card-header {
            margin-bottom: 1.75rem;
        }

        .card-header h1 {
            font-size: 18px;
            font-weight: 500;
            color: #111;
            margin-bottom: 4px;
        }

        .card-header p {
            font-size: 13px;
            color: #666;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 1.25rem;
        }

        label {
            font-size: 13px;
            font-weight: 500;
            color: #555;
        }

        input, textarea {
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
            padding: 9px 12px;
            border: 0.5px solid #ccc;
            border-radius: 8px;
            background: #ffffff;
            color: #111;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus, textarea:focus {
            border-color: #378ADD;
            box-shadow: 0 0 0 3px rgba(55, 138, 221, 0.12);
        }

        textarea {
            resize: vertical;
            min-height: 110px;
            line-height: 1.6;
        }

        input::placeholder, textarea::placeholder {
            color: #aaa;
        }

        .divider {
            border: none;
            border-top: 0.5px solid #e0e0e0;
            margin: 1.5rem 0;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #1a3f7a;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn:hover {
            background: #15336a;
        }

        .btn:active {
            background: #0f2555;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            font-size: 13px;
            color: #666;
            text-decoration: none;
        }

        .back-link:hover {
            color: #111;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <h1>Create new blog</h1>
        <p>Fill in the details below to publish your post.</p>
    </div>

    <form action="/create" method="post">
        <div class="field">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" placeholder="Enter blog title">
        </div>

        <div class="field">
            <label for="content">Content</label>
            <textarea id="content" name="content" placeholder="Write your blog content here…"></textarea>
        </div>

        <div class="field">
            <label for="author">Author</label>
            <input type="text" id="author" name="author" placeholder="Your name">
        </div>

        <hr class="divider">

        <button type="submit" class="btn">Publish blog</button>
    </form>

    <a href="/" class="back-link">← Back to home</a>
</div>

</body>
</html>
