<!DOCTYPE html>
<html>
<head>
    <title>Delete Blog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .card {
            background: #fff;
            width: 100%;
            max-width: 460px;
            border-radius: 12px;
            border: 0.5px solid #e0e0e0;
            overflow: hidden;
        }

        .card-top {
            padding: 1.5rem 1.75rem 1.25rem;
        }

        .danger-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #fef0f0;
            color: #b91c1c;
            font-size: 12px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 6px;
            margin-bottom: 1rem;
        }

        .card-top h1 {
            font-size: 17px;
            font-weight: 500;
            color: #111;
            margin-bottom: 6px;
        }

        .card-top p {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        .blog-preview {
            margin: 1.25rem 1.75rem;
            background: #f8f8f8;
            border: 0.5px solid #e8e8e8;
            border-radius: 8px;
            padding: 1rem 1.1rem;
        }

        .blog-preview h3 {
            font-size: 14px;
            font-weight: 500;
            color: #111;
            margin-bottom: 4px;
        }

        .blog-preview .excerpt {
            font-size: 12px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .blog-preview .author {
            font-size: 12px;
            color: #999;
        }

        .card-actions {
            padding: 1.25rem 1.75rem;
            border-top: 0.5px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .delete-btn {
            background: #b91c1c;
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }

        .delete-btn:hover {
            background: #991515;
        }

        .delete-btn:active {
            background: #7a1010;
        }

        .cancel {
            text-decoration: none;
            font-size: 13px;
            color: #666;
            transition: color 0.15s;
        }

        .cancel:hover {
            color: #111;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-top">
        <div class="danger-badge">Destructive action</div>
        <h1>Delete this blog?</h1>
        <p>This action cannot be undone. The blog post will be permanently removed.</p>
    </div>

    <div class="blog-preview">
        <h3>{{ blog.title }}</h3>
        <div class="excerpt">{{ blog.content }}</div>
        <div class="author">By {{ blog.author }}</div>
    </div>

    <div class="card-actions">
        <form action="/delete/{{ blog.id }}" method="post" style="margin:0;">
            <button type="submit" class="delete-btn">Yes, delete</button>
        </form>
        <a href="/" class="cancel">Cancel</a>
    </div>
</div>

</body>
</html>
